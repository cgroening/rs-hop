# Example hop configuration for trying the TUI:
#
#   HOP_CONFIG=examples/config.toml cargo run
#
# For a zero-setup demo with built-in screenshot data (no real git or config),
# run `hop --demo` instead.
#
# It mixes a favourite, an archived entry, a deliberately broken path (shown
# with a red "!" - press p to repair it), file/folder entries and a slug.
# A "path" entry auto-detects folder vs file on open: a folder cds, a text
# file opens in the editor, anything else opens with the default app.
# The Files and Folders tab groups entries by section (press s to jump, M to
# manage); entries without a section fall into "Ungrouped".

git_program = "lazygit"
github_username = "cgroening"
example_mode = false
# fetch_on_start = false   # git fetch in the background when hop starts
# editor_extensions = ["rs", "md", "txt"]   # override the built-in text list

# ZIP backups: z zips the selected/cursor git repo, Z zips all git repos, into
# this folder. The file is named after the entry (slugified, e.g. rs-mdtask.zip);
# same-named repos get a short path-hash suffix. A leading ~ is expanded.
# zip_backup_folder = "~/Backups/repos"
# Directory names excluded from a backup (matched as a name prefix, so "target"
# also covers "target.nosync"). Omit to use the built-in default list
# (target, node_modules, dist, build, …).
# zip_exclude_dirs = ["target", "node_modules", "dist", "build"]

# Section order for the Files and Folders tab.
sections = ["Code", "Docs"]

# Appearance: the active theme, per-colour overrides and the glyph set. hop
# ships a rose "default" theme and a "monochrome" theme; add your own under
# [themes.<name>]. The legacy [icons] table below still works (folded into
# `glyphs`) but [appearance].glyphs is preferred.
[appearance]
theme = "default"     # default | monochrome | <your [themes.*] name>
glyphs = "unicode"    # unicode | ascii
# colors = { accent = "#f7a3bd" }   # override individual palette colours

# A user-defined theme (only accent/foreground/background are required; the rest
# derive from the background). Select it via [appearance].theme = "midnight".
# [themes.midnight]
# accent = "#8899ff"
# background = "#0b0b14"

# Rebind keys per action (see the help overlay for action names). A value may be
# one key or a list. Example:
# [keys]
# add = "n"
# delete = ["d", "backspace"]

# Legacy glyph selector (kept for back-compat; prefer [appearance].glyphs).
[icons]
variant = "unicode"   # unicode | ascii

[column_widths]
name = 30
status = 6
github_repo_name = 20
[column_widths.current_branch_name]
min = 10
max = 14

